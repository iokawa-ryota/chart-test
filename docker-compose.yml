version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chart-test-db
    environment:
      POSTGRES_USER: chartuser
      POSTGRES_PASSWORD: chartpassword
      POSTGRES_DB: chartdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
